<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Support | Jester Jewels</title>
    <style>
        :root { --bg: #0f0a1e; --card: rgba(255, 255, 255, 0.05); --accent: #ffd700; --text: #f0f0f5; --safe-top: env(safe-area-inset-top); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; }
        nav { padding-top: max(20px, var(--safe-top)); padding-bottom: 15px; display: flex; justify-content: center; gap: 10px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); position: sticky; top: 0; }
        nav a { color: var(--text); text-decoration: none; font-size: 0.9rem; padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(255,215,0,0.2); }
        .container { max-width: 600px; margin: 80px auto; padding: 0 20px; }
        .card { background: var(--card); padding: 50px 20px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        .contact-btn { display: inline-block; padding: 15px 40px; background: var(--accent); color: #000; text-decoration: none; border-radius: 30px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .contact-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,215,0,0.4); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="marketing.html">Marketing</a>
        <a href="support.html" class="active">Support</a>
        <a href="privacy.html">Privacy</a>
    </nav>
    <div class="container">
        <div class="card">
            <h1>Need Help?</h1>
            <p>If you have any questions or feedback regarding Jester Jewels, I'm here to listen.</p>
            <a href="mailto:zahhar0btaras141@gmail.com" class="contact-btn">Email Taras Shtefko</a>
            <p style="margin-top: 30px; opacity: 0.6;">zahhar0btaras141@gmail.com</p>
        </div>
    </div>
</body>
</html>
